# 云编译 macOS 桌面版 —— 照搬 FlClash 官方 build.yaml 的 macos 作业。
# macOS 只能在 Mac 上编译(苹果工具链),你的 Windows 电脑编不了,所以 macOS 只能走
# GitHub Actions 的 mac runner(云端)。版本沿用你 fork 已验证的 Flutter 3.41.9 / Go 1.24.0。
#
# 放到你 fork 的 .github/workflows/ 下。推 v* tag 或手动 Run workflow 即构建。
# 出两个产物:artifact-macos-arm64(Apple 芯片 M 系)、artifact-macos-amd64(Intel 芯片),
# 各含一个 .dmg。用户按自己 Mac 的芯片选对应的下。
name: build-macos

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest   # Apple 芯片(arm64)
            arch: arm64
          - os: macos-13        # Intel 芯片(amd64)
            arch: amd64
    steps:
      - name: Checkout(含子模块)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - name: Flutter 依赖
        run: |
          flutter --version
          flutter pub get

      # FlClash 编排脚本:先编 Go 内核,再用 flutter_distributor 打 macOS .dmg。
      # mac runner 自带 Xcode / CocoaPods,无需额外安装。
      - name: 构建 macOS 安装包(.dmg)
        run: dart setup.dart macos --env stable -v

      - name: 上传产物(在这里下载 .dmg)
        uses: actions/upload-artifact@v4
        with:
          name: artifact-macos-${{ matrix.arch }}
          path: ./dist
          overwrite: true
