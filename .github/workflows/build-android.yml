name: build-android

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Android config (Firebase required + optional signing)
        env:
          SERVICE_JSON: ${{ secrets.SERVICE_JSON }}
          KEYSTORE: ${{ secrets.KEYSTORE }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$SERVICE_JSON" ]; then
            echo "$SERVICE_JSON" | base64 --decode > android/app/google-services.json
            echo "wrote google-services.json"
          else
            echo "::warning::No SERVICE_JSON secret; build will fail unless you removed Firebase from build.gradle.kts (see BUILD-ANDROID.md)."
          fi
          if [ -n "$KEYSTORE" ]; then
            echo "$KEYSTORE" | base64 --decode > android/app/keystore.jks
            {
              echo "keyAlias=$KEY_ALIAS"
              echo "storePassword=$STORE_PASSWORD"
              echo "keyPassword=$KEY_PASSWORD"
            } >> android/local.properties
            echo "release-signed"
          else
            echo "no keystore: debug-signed .dev APK (sideloadable, not for Play)"
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c
          add-to-path: true
          link-to-sdk: true

      - name: Get Flutter dependencies
        run: |
          flutter --version
          flutter pub get

      - name: Build APK (all ABIs, split-per-abi)
        run: dart setup.dart android --env stable -v

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-android
          path: ./dist
          overwrite: true
